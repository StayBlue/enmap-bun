name: Nightly Build

on:
  workflow_run:
    workflows:
      - Continuous Integration
    types:
      - completed
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      publish:
        description: Publish or update the nightly prerelease and tag
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: false

jobs:
  nightly:
    name: Build Nightly Package
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        (
          github.event.workflow_run.head_branch == 'main' ||
          github.event.workflow_run.head_branch == 'master'
        )
      )
    runs-on: ubuntu-latest
    env:
      NIGHTLY_REF: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
    steps:
      - name: Checkout Project
        if: ${{ env.ACT != 'true' }}
        uses: actions/checkout@v4
        with:
          ref: ${{ env.NIGHTLY_REF }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create Nightly Package
        run: bun ./scripts/build-nightly-package.mjs

      - name: Upload Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nightly-package
          path: nightly-dist/*
          if-no-files-found: error

      - name: Move Nightly Tag
        if: |
          github.event_name != 'workflow_dispatch' ||
          inputs.publish == true ||
          inputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f nightly "$NIGHTLY_REF"
          git push origin refs/tags/nightly --force

      - name: Publish Nightly Prerelease
        if: |
          github.event_name != 'workflow_dispatch' ||
          inputs.publish == true ||
          inputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view nightly >/dev/null 2>&1 && gh release delete nightly --yes || true
          gh release create nightly \
            nightly-dist/*.tgz \
            nightly-dist/sha256.sum \
            nightly-dist/nightly.json \
            --target "$NIGHTLY_REF" \
            --title "Nightly" \
            --notes-file nightly-dist/NOTES.md \
            --prerelease
