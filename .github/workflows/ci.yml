name: Continuous Integration

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - name: Install Dependencies
        run: bun install
      - name: Build
        run: bun run build
      - name: Run Tests
        run: bun test --coverage
